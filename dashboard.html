<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<header>

    <h1>Weather Dashboard</h1>

</header>

<main>

<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Enter City Name">

    <button id="searchBtn">

        Search

    </button>

</section>

<section class="weather-card">

    <div id="weatherIcon">

        🌤

    </div>

    <h2 id="temperature">

        --°C

    </h2>

    <h3 id="cityName">

        Search a city

    </h3>

    <p id="condition">

        Weather Condition

    </p>

    <div class="weather-details">

        <div>

            <h4>Humidity</h4>

            <p id="humidity">

                --

            </p>

        </div>

        <div>

            <h4>Wind</h4>

            <p id="wind">

                --

            </p>

        </div>

        <div>

            <h4>Feels Like</h4>

            <p id="feelsLike">

                --

            </p>

        </div>

    </div>

</section>

<section>

<h2 class="forecast-title">

    3-Day Forecast

</h2>

<div
class="forecast-container"

id="forecastContainer">

<div class="forecast-card">

<h3>Day 1</h3>

<p>--°C</p>

<p>---</p>

</div>

<div class="forecast-card">

<h3>Day 2</h3>

<p>--°C</p>

<p>---</p>

</div>

<div class="forecast-card">

<h3>Day 3</h3>

<p>--°C</p>

<p>---</p>

</div>

</div>

</section>

</main>

<script src="js/dashboard.js"></script>

</body>

</html>
