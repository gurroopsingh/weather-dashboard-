<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <h1>🌤 Weather Dashboard</h1>

        <p class="subtitle">
            Login to continue
        </p>

        <form id="loginForm">

            <label for="username">
                Username
            </label>

            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                required
            >

            <label for="password">
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit" id="loginBtn">
                Login
            </button>

            <p id="error"></p>

        </form>

    </div>

</body>
</html>
